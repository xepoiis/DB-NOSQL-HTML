<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/monke.ico">
    <link rel="stylesheet" href="./css/bootstrap.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/formulario.js"></script>

    <title>MONKENOSQL</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./listado.html">Listado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <br>
        <form>
            <p class="h1">Formulario de Registro</p>
            <div class="container">
                <div class="row">
                    <div class="col">
                        <label for="input_nombre" class="form-label">Nombre Usuario:</label>
                        <input class="form-control" type="text" name="nombre" id="input_nombre"
                            placeholder="Ingrese su nombre">
                    </div>
                    <div class="col">
                        <label for="input_correo" class="form-label">Correo Electrónico:</label>
                        <input class="form-control" type="email" name="nombre" id="input_correo"
                            placeholder="Ingrese su nombre">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_contrasena" class="form-label">Contraseña:</label>
                        <input type="password" class="form-control" name="input_contrasena" id="input_contrasena">
                    </div>
                    <div class="col">
                        <label for="input_repetir_contrasena" class="form-label">Repetir Contraseña:</label>
                        <input type="password" class="form-control" name="input_repetir_contrasena"
                            id="input_rep_contrasena">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <p>Seleccione su género:</p>
                        <select class="form-select" aria-label="Seleccione su género">
                            <option selected>Seleccione su género</option>
                            <option value="1">Masculino</option>
                            <option value="2">Femenino</option>
                            <option value="3">Prefiero NO decir</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" name="fechaNacimiento" id="input_nacimiento">
                    </div>
                </div>
                <br>
                
                <div class="row">
                    <div class="col">
                        <label for="inputFoto" class="form-label">Foto Personal:</label>
                        <input type="file" class="form-control" name="" id="input_foto">
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="validarFormulario()">Aceptar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>


</body>

</html>
