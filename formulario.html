<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="shortcut icon" href="https://icons.iconarchive.com/icons/fa-team/fontawesome-brands/128/FontAwesome-Brands-Mailchimp-icon.png">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Formulario de Registro MONKENOSQL</title>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container">
        <br>
        <form>
            <p class="h1">Formulario de Registro</p>
            <div class="container">
                <div class="row">
                    <div class="col">
                        <label for="input_nombre" class="form-label">Nombre Usuario:</label>
                        <input class="form-control" type="text" name="nombre" id="input_nombre"
                            placeholder="Ingrese su nombre">
                    </div>
                    <div class="col">
                        <label for="input_correo" class="form-label">Correo Electrónico:</label>
                        <input class="form-control" type="email" name="nombre" id="input_correo"
                            placeholder="Ingrese su nombre">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_contrasena" class="form-label">Contraseña:</label>
                        <input type="password" class="form-control" name="input_contrasena" id="input_contrasena">
                    </div>
                    <div class="col">
                        <label for="input_repetir_contrasena" class="form-label">Repetir Contraseña:</label>
                        <input type="password" class="form-control" name="input_repetir_contrasena"
                            id="input_rep_contrasena">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <p>Seleccione su género:</p>
                        <select class="form-select" aria-label="Seleccione su género">
                            <option selected>Seleccione su género</option>
                            <option value="1">Masculino</option>
                            <option value="2">Femenino</option>
                            <option value="3">Prefiero NO decir</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" name="fechaNacimiento" id="inputNacimiento">
                    </div>
                </div>
                <br>
                
                <div class="row">
                    <div class="col">
                        <label for="inputFoto" class="form-label">Foto Personal:</label>
                        <input type="file" class="form-control" name="" id="inputFoto">
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                        <button type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>


</body>

</html>
